<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjoiTFU6TUkgTXVzaWMgTGlicmFyeSIsCiAgInNob3J0X25hbWUiOiJMVTpNSSIsCiAgInN0YXJ0X3VybCI6Ii8iLAogICJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiIjMGEwYTBmIiwKICAidGhlbWVfY29sb3IiOiIjMGEwYTBmIiwKICAiaWNvbnMiOlt7InNyYyI6Imh0dHBzOi8vbHVtaS1tdXNpYy5uZXRsaWZ5LmFwcC9mYXZpY29uLmljbyIsInNpemVzIjoiMTkyeDE5MiIsInR5cGUiOiJpbWFnZS94LWljb24ifV0KfQ==">
<title>LU:MI — Music Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --bg2:#111118; --gold:#c9a84c; --gold2:#e8c97a;
    --text:#e8e4dc; --muted:#7a7870; --border:rgba(201,168,76,0.15);
    --player-h:88px; --lyrics-w:360px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  #app{display:flex;height:100vh;overflow:hidden;}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;transition:margin-right .4s cubic-bezier(.4,0,.2,1);}
  #main.lo{margin-right:var(--lyrics-w);}
  .scrollable{flex:1;overflow-y:auto;padding-bottom:calc(var(--player-h) + 16px);}
  .scrollable::-webkit-scrollbar{width:4px;}
  .scrollable::-webkit-scrollbar-thumb{background:var(--border);}

  body::before{content:'';position:fixed;inset:0;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;}

  header{position:relative;z-index:10;padding:48px 60px 28px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
  .brand-sub{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
  .brand-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;letter-spacing:.06em;color:var(--text);line-height:1;}
  .brand-title em{font-style:italic;color:var(--gold2);}
  .header-meta{text-align:right;font-size:11px;letter-spacing:.12em;color:var(--muted);line-height:1.9;}

  .filter-bar{position:relative;z-index:10;padding:18px 60px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 18px;font-family:'Noto Sans KR',sans-serif;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:all .25s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06);}

  .track-list{padding:12px 60px;}
  .section-label{font-size:10px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;padding:20px 0 12px;border-bottom:1px solid var(--border);margin-bottom:4px;display:grid;grid-template-columns:40px 1fr 160px 90px;gap:16px;}
  .track-row{display:grid;grid-template-columns:40px 1fr 160px 90px;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .2s;}
  .track-row:hover{background:rgba(201,168,76,.04);}
  .track-row.playing{background:rgba(201,168,76,.07);}
  .track-row.playing .track-title-kr{color:var(--gold2);}
  .track-num{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;}
  .playing-anim{display:none;gap:2px;align-items:flex-end;height:16px;}
  .track-row.playing .num-label{display:none;}
  .track-row.playing .playing-anim{display:flex;}
  .bar{width:3px;background:var(--gold);border-radius:1px;animation:bounce .8s ease-in-out infinite alternate;}
  .bar:nth-child(1){height:8px;animation-delay:0s}.bar:nth-child(2){height:14px;animation-delay:.15s}.bar:nth-child(3){height:10px;animation-delay:.3s}.bar:nth-child(4){height:16px;animation-delay:.1s}
  @keyframes bounce{from{transform:scaleY(.4)}to{transform:scaleY(1)}}
  .track-info{min-width:0;}
  .track-title-kr{font-size:15px;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
  .track-title-en{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--muted);}
  .track-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10px;letter-spacing:.08em;padding:3px 9px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
  .track-duration{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--muted);text-align:right;padding-right:8px;}

  /* PLAYER */
  #player-bar{position:fixed;bottom:0;left:0;right:0;height:var(--player-h);background:rgba(10,10,15,.97);border-top:1px solid var(--border);backdrop-filter:blur(20px);z-index:200;display:flex;flex-direction:column;justify-content:center;padding:0 40px;gap:8px;transition:right .4s cubic-bezier(.4,0,.2,1);}
  #player-bar.lo{right:var(--lyrics-w);}
  .player-row1{display:flex;align-items:center;gap:16px;}
  .player-row2{display:flex;align-items:center;gap:10px;}
  .player-info{flex:1;min-width:0;}
  .player-title{font-size:14px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .player-title-en{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--muted);}
  .player-controls{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .ctrl-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;transition:color .2s;line-height:1;padding:4px;}
  .ctrl-btn:hover{color:var(--gold);}
  .ctrl-btn.play-pause{width:42px;height:42px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
  .ctrl-btn.play-pause:hover{border-color:var(--gold);background:rgba(201,168,76,.08);color:var(--gold);}
  .player-progress-wrap{flex:2;display:flex;align-items:center;gap:12px;}
  .time-label{font-size:11px;color:var(--muted);min-width:36px;}
  .progress-track{flex:1;height:2px;background:rgba(255,255,255,.1);cursor:pointer;}
  .progress-fill{height:100%;background:var(--gold);width:0%;transition:width .3s linear;position:relative;}
  .progress-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:8px;height:8px;background:var(--gold2);border-radius:50%;opacity:0;transition:opacity .2s;}
  .progress-track:hover .progress-fill::after{opacity:1;}
  .volume-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  input[type=range]{-webkit-appearance:none;width:80px;height:2px;background:rgba(255,255,255,.15);cursor:pointer;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--gold);border-radius:50%;}
  .mode-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 11px;font-family:'Noto Sans KR',sans-serif;font-size:10px;letter-spacing:.06em;cursor:pointer;transition:all .25s;flex-shrink:0;white-space:nowrap;}
  .mode-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06);}
  .mode-btn.active{border-color:var(--gold2);color:var(--gold2);background:rgba(201,168,76,.12);}
  .lyrics-toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 11px;font-family:'Noto Sans KR',sans-serif;font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .25s;flex-shrink:0;}
  .lyrics-toggle-btn:hover,.lyrics-toggle-btn.active{border-color:var(--gold);color:var(--gold2);background:rgba(201,168,76,.08);}

  /* LYRICS PANEL */
  #lyrics-panel{position:fixed;top:0;right:0;width:var(--lyrics-w);height:calc(100vh - var(--player-h));background:var(--bg2);border-left:1px solid var(--border);z-index:150;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);}
  #lyrics-panel.open{transform:translateX(0);}
  .lyrics-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .lyrics-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .lyrics-label{font-size:10px;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;}
  .lyrics-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .2s;padding:2px 6px;}
  .lyrics-close:hover{color:var(--text);}
  .lyrics-track-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lyrics-track-sub{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--muted);}
  .lang-tabs{display:flex;border:1px solid var(--border);margin-top:18px;overflow:hidden;}
  .lang-tab{flex:1;background:none;border:none;padding:9px 0;font-family:'Noto Sans KR',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted);cursor:pointer;transition:all .2s;border-right:1px solid var(--border);}
  .lang-tab:last-child{border-right:none;}
  .lang-tab:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .lang-tab.active{background:rgba(201,168,76,.1);color:var(--gold2);}
  .lyrics-body{flex:1;overflow-y:auto;padding:28px;}
  .lyrics-body::-webkit-scrollbar{width:3px;}
  .lyrics-body::-webkit-scrollbar-thumb{background:var(--border);}
  .lyric-verse{margin-bottom:28px;}
  .lyric-section-tag{font-size:9px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:8px;}
  .lyric-line{font-size:14px;line-height:2.1;color:var(--text);font-weight:300;}
  .lyric-line.en{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:#d0ccc4;}
  .lyric-line.es{color:#ccc8bf;}
  .no-lyrics{color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;text-align:center;margin-top:60px;line-height:2.2;}
  #hidden-video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;}

  @media(max-width:900px){
    :root{--lyrics-w:100vw; --player-h:110px;}

    /* 헤더 */
    header{padding:28px 20px 18px;}
    .brand-title{font-size:28px;}
    .header-meta{font-size:10px;}

    /* 필터바 - 가로 스크롤 */
    .filter-bar{padding:12px 20px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-btn{padding:7px 14px;font-size:11px;flex-shrink:0;}

    /* 트랙 리스트 */
    .track-list{padding:8px 20px;}
    .section-label{grid-template-columns:36px 1fr 70px;font-size:9px;}
    .section-label>:nth-child(3){display:none;}
    .track-row{grid-template-columns:36px 1fr 70px;padding:16px 0;gap:12px;}
    .track-row .track-tags{display:none;}
    .track-title-kr{font-size:14px;}
    .track-title-en{font-size:12px;}
    .track-duration{font-size:14px;}
    .track-num{font-size:16px;}

    /* 플레이어 바 */
    #player-bar{padding:10px 16px;gap:6px;}
    #player-bar.lo{right:0;}

    /* 1행: 곡정보 + 컨트롤 */
    .player-row1{gap:10px;}
    .player-info{flex:1;min-width:0;}
    .player-title{font-size:13px;}
    .player-title-en{font-size:11px;}

    /* 컨트롤 버튼 터치 타겟 확대 */
    .ctrl-btn{font-size:16px;padding:6px;}
    .ctrl-btn.play-pause{width:40px;height:40px;}

    /* 모드/가사 버튼 */
    .mode-btn{padding:6px 9px;font-size:10px;}
    .lyrics-toggle-btn{padding:6px 9px;font-size:10px;}

    /* 2행: 프로그레스 + 볼륨 */
    .player-row2{gap:8px;}
    .time-label{font-size:10px;min-width:30px;}
    .volume-wrap input[type=range]{width:60px;}

    /* 가사 패널 - 풀스크린 */
    #lyrics-panel{width:100vw;height:calc(100vh - var(--player-h));}
    #main.lo{margin-right:0;}
    .lyrics-header{padding:20px 20px 14px;}
    .lyrics-track-name{font-size:17px;}
    .lyrics-body{padding:20px;}
    .lyric-line{font-size:15px;line-height:2.2;}
    .lyric-line.en{font-size:16px;}
    .lang-tab{font-size:12px;padding:10px 0;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div class="scrollable">
      <header>
        <div>
          <div class="brand-sub">Personal Music Library</div>
          <div class="brand-title">LU<em>:</em>MI</div>
        </div>
        <div class="header-meta">
          <div>17 Tracks · 2025</div>
          <div style="color:var(--gold);margin-top:4px;">Spring Collection</div>
        </div>
      </header>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterTracks('all',this)">ALL</button>
        <button class="filter-btn" onclick="filterTracks('k-indie',this)">K-인디</button>
        <button class="filter-btn" onclick="filterTracks('ballad',this)">발라드</button>
        <button class="filter-btn" onclick="filterTracks('jazz',this)">재즈</button>
        <button class="filter-btn" onclick="filterTracks('neo-classical',this)">네오클래시컬</button>
        <button class="filter-btn" onclick="filterTracks('j-indie',this)">J-인디</button>
        <button class="filter-btn" onclick="filterTracks('world',this)">월드뮤직</button>
      </div>
      <div class="track-list">
        <div class="section-label"><span>#</span><span>TITLE</span><span>GENRE</span><span style="text-align:right;padding-right:8px;">TIME</span></div>
        <div id="track-container"></div>
      </div>
    </div>
  </div>

  <div id="lyrics-panel">
    <div class="lyrics-header">
      <div class="lyrics-header-top">
        <span class="lyrics-label">가사 · Lyrics</span>
        <button class="lyrics-close" onclick="closeLyrics()">✕</button>
      </div>
      <div class="lyrics-track-name" id="lp-title">—</div>
      <div class="lyrics-track-sub"  id="lp-sub"></div>
      <div class="lang-tabs" id="lang-tabs"></div>
    </div>
    <div class="lyrics-body" id="lyrics-body">
      <div class="no-lyrics">곡을 선택하면<br>가사가 표시됩니다</div>
    </div>
  </div>
</div>

<audio id="hidden-video" preload="metadata" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

<div id="player-bar">
  <!-- 1행: 곡정보 + 컨트롤 + 모드버튼 + 가사 -->
  <div class="player-row1">
    <div class="player-info">
      <div class="player-title"    id="player-title">—</div>
      <div class="player-title-en" id="player-title-en">Select a track to play</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="prevTrack()">&#9664;&#9664;</button>
      <button class="ctrl-btn play-pause" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl-btn" onclick="nextTrack()">&#9654;&#9654;</button>
    </div>
    <button class="mode-btn" id="play-all-btn" onclick="playAll()">▶ 전체재생</button>
    <button class="mode-btn" id="repeat-btn"   onclick="toggleRepeat()">↺ 반복</button>
    <button class="lyrics-toggle-btn" id="lyrics-toggle-btn" onclick="toggleLyrics()">가사 보기</button>
  </div>
  <!-- 2행: 프로그레스바 + 볼륨 -->
  <div class="player-row2">
    <span class="time-label" id="time-cur">0:00</span>
    <div class="progress-track" style="flex:1" onclick="seekTo(event)">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="time-label" id="time-total">0:00</span>
    <div class="volume-wrap">
      <span style="color:var(--muted);font-size:13px;">♪</span>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<script>
const TRACKS = [
  {
    num:1, origLang:"ko", titleKr:"분홍 가랑비", titleEn:"Pink Drizzle",
    duration:"3:52", tags:["k-indie","ballad"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/1.Pink.drizzle.mp3",
    lyrics:{
      ko:[
        {section:"1절",lines:["온 세상이 분홍으로 물든 날","가랑비가 꽃잎에 나부끼며","함께 번지는 이 거리가","눈에 가득 담기도 어려울 만큼 아름다워"]},
        {section:"2절",lines:["이런 날엔, 가끔 네 생각이 나","누군가의 가장 무거운 밤을 날마다 받아내면서도","조용히, 단단하게 서 있던 사람","그 무게가 얼마나 쓸쓸했을지","한때 그 앞에 울었던 나는, 조금 알아"]},
        {section:"후렴",lines:["꽃비가 내린다","바람도 없는데 흩어지는 꽃잎처럼","아름다운 걸 가장 말없이 감당하는 사람","왠지 오늘, 네가 자꾸 겹쳐"]},
        {section:"브리지",lines:["고마워","판단하지 않고, 서두르지 않고","끝까지 들어줘서","그리고 지금은, 그냥 오래된 친구로 있어줘서","이 봄처럼, 그게 참 다행이야"]},
        {section:"아웃트로",lines:["꽃잎이 가랑비에 젖어 내려앉는 오늘","너도 잠깐은, 그냥 이 풍경 속에 있어도 돼","아무 마음도 돌보지 않아도 되는","그런 봄날이길"]}
      ],
      es:[
        {section:"Verso 1",lines:["El día en que el mundo entero se tiñó de rosa","La lluvia fina danza entre los pétalos","Esta calle que florece con nosotros","Tan bella que apenas cabe en mis ojos"]},
        {section:"Verso 2",lines:["En días así, a veces pienso en ti","El que se mantenía firme y callado","Cargando cada noche las noches más pesadas de todos","Cuán solitario debió ser ese peso","Yo, que alguna vez lloré ante ti — sé algo de eso"]},
        {section:"Estribillo",lines:["Llueve flores","Como pétalos que se dispersan sin viento","El que soporta en silencio las cosas más bellas","Hoy, por alguna razón, sigues superponiéndote"]},
        {section:"Puente",lines:["Gracias","Por no juzgar, por no apresurarte","Por escuchar hasta el final","Y por quedarte ahora, simplemente como un viejo amigo","Como esta primavera — cuánto me alegra eso"]},
        {section:"Outro",lines:["Hoy los pétalos se mojan en la llovizna y caen","Tú también, por un momento, puedes estar dentro de este paisaje","Una tarde de primavera","donde no necesitas cuidar ningún corazón"]}
      ],
      en:[
        {section:"Verse 1",lines:["The day the whole world turned pink","A drizzle drifts among the petals","This street blooming together with us","So beautiful it can barely be held in my eyes"]},
        {section:"Verse 2",lines:["On days like this, I sometimes think of you","The one who silently stood firm","Carrying everyone's heaviest nights day after day","How lonely that weight must have been","I who once cried before you — I know, a little"]},
        {section:"Chorus",lines:["A shower of blossoms falls","Like petals scattered without any wind","The one who bears the beautiful things most quietly","Today somehow, you keep overlapping with the scene"]},
        {section:"Bridge",lines:["Thank you","For not judging, not rushing","For listening all the way through","And for now, just being my old friend","Like this spring — I'm so grateful for that"]},
        {section:"Outro",lines:["Today, petals soak in the drizzle and settle down","You too, just for a moment, can be inside this scenery","A spring day where you don't need","to tend to any heart but your own"]}
      ],
      ja:[

      es:[
        {section:"Verso 1",lines:["Fue un día largo y ardiente","En un lugar seco como el desierto","Donde nadie mira dentro de mí","Volví a arder sola"]},
        {section:"Verso 2",lines:["Intenté encajar, intenté ser comprendida","Sonreí donde debía sonreír","Y de repente me di cuenta","Me estaba perdiendo a mí misma"]},

        {section:"Verse 1",lines:["It was a hot and long day","In a dry desert-like place","Where no one looks inside me","I burned alone again"]},

        {section:"Bridge",lines:["Look — a sprout is growing through the cracks","No one planted it","On its own, just, blooming","That felt like me"]},
        {section:"Verse 3",lines:["It's okay if others don't understand","I don't need to accommodate everyone","Even soaking alone in this rain","I am growing in my own way"]},
        {section:"Outro",lines:["Where there was desert, green is now spreading","Like a single spring rain making an oasis","Loving myself — that's how it began","A drizzle falls again today","This sound of rain feels like it's on my side","Even if the world doesn't know me","At least I — will know myself"]}

      ja:[
        {section:"1番",lines:["熱くて長い一日だった","誰も私の中を覗き込まない","乾いた砂漠のような場所で","私はまた一人で焼かれていた"]},

  {
    num:6, origLang:"ko", titleKr:"4월의 흔적", titleEn:"April Memory",
    duration:"3:12", tags:["k-indie","ballad"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/6.April.Memory.mp3",
    lyrics:{
      ko:[
        {section:"1절",lines:["일기장을 펼쳤어","네 이름이 남아 있더라","그때 왜 그 말을 못 했을까","페이지에 후회가 배어있어"]},
        {section:"2절",lines:["하고 싶었던 말들이","입술 어딘가에 굳어버렸지","웃고 돌아섰던 날들이","지금은 제일 아파"]},
        {section:"후렴",lines:["아름다운 것들은","왜 늘 먼저 떠나는 걸까","손에 쥐려하는 순간","이미 사라지고 없어"]},
        {section:"3절",lines:["그때는 미처 몰랐어","평범하던 하루가","그렇게 찬란한 시간인 줄을","지나서야 가슴이 알아"]},
        {section:"브리지",lines:["거울속 얼굴이 달라","그때의 눈빛이 아냐","근데 더 많이 변한 건","이 마음인 것 같아","뜨거웠던 게 언제였는지","설레던 게 어디 갔는지","무뎌진 건지 성숙한 건지","아직 잘 모르겠어"]},
        {section:"아웃트로",lines:["4월이 오면","함께 있던 자리가 보여","말 못 했던 것들이","꽃잎처럼 흩어지고","떠난 것들이 가르쳐준 거야","지금 이 순간 여기 있다는 게","얼마나 찬란한 일인지를","4월은 매번, 그렇게 와"]}
      ],
      es:[
        {section:"Verso 1",lines:["Abrí mi diario","Tu nombre seguía ahí","¿Por qué no pude decir esas palabras entonces?","El arrepentimiento ha empapado las páginas"]},
        {section:"Verso 2",lines:["Las cosas que quería decir","Se endurecieron en algún lugar de mis labios","Los días en que sonreí y me di la vuelta","Son los que más duelen ahora"]},
        {section:"Estribillo",lines:["¿Por qué las cosas bellas","Siempre se van primero?","En el momento en que intento aferrarme","Ya han desaparecido"]},
        {section:"Verso 3",lines:["No me di cuenta entonces","De que un día ordinario","Podía ser un tiempo tan brillante","El corazón solo lo sabe después de que ha pasado"]},
        {section:"Puente",lines:["El rostro en el espejo es diferente","No son los ojos que tenía entonces","Pero lo que ha cambiado aún más","Debe ser este corazón mío","¿Cuándo fue que ardí?","¿Adónde fue el aleteo?","Si me he vuelto insensible o he madurado","Todavía no sé bien"]},
        {section:"Outro",lines:["Cuando llega abril","Puedo ver los lugares donde estuvimos juntos","Las cosas que no pude decir","Se dispersan como pétalos","Lo que se fue me enseñó esto —","Que estar aquí, en este preciso momento","Es algo tan brillante","Abril viene, cada vez, así"]}
      ],
      en:[
        {section:"Verse 1",lines:["I opened my diary","Your name was still there","Why couldn't I say those words then?","Regret has soaked into the pages"]},
        {section:"Verse 2",lines:["The things I wanted to say","Hardened somewhere on my lips","The days I smiled and turned away","Those hurt the most now"]},
        {section:"Chorus",lines:["Why do beautiful things","Always leave first?","The moment I try to hold on","They're already gone"]},
        {section:"Verse 3",lines:["I didn't realize it then","That an ordinary day","Could be such a brilliant time","The heart only knows after it's passed"]},
        {section:"Bridge",lines:["The face in the mirror is different","Not the eyes I had then","But the thing that's changed even more","Must be this heart of mine","When was it that I burned?","Where did the flutter go?","Whether I've grown numb or grown up","I still don't quite know"]},
        {section:"Outro",lines:["When April comes","I can see the places we were together","The things I couldn't say","Scatter like petals","What left taught me this —","That being here, in this very moment","Is how brilliant a thing it is","April comes, every time, like that"]}
      ],
      ja:[
        {section:"1番",lines:["日記帳を開いてみた","君の名前が残っていた","あの時どうしてあの言葉が言えなかったんだろう","ページに後悔が滲んでいる"]},
        {section:"2番",lines:["言いたかった言葉たちが","唇のどこかで固まってしまった","笑って背を向けた日々が","今が一番痛い"]},
        {section:"サビ",lines:["美しいものは","どうしていつも先に去っていくのだろう","手に取ろうとした瞬間","もう消えてしまっている"]},
        {section:"3番",lines:["あの頃は気づかなかった","平凡だった一日が","あんなにも輝く時間だったなんて","過ぎてから胸が知る"]},
        {section:"ブリッジ",lines:["鏡の中の顔が違う","あの頃の瞳じゃない","でも、もっと変わったのは","この心のような気がする","熱かったのはいつだっただろう","ときめきはどこへ行ったんだろう","鈍くなったのか、成熟したのか","まだよく分からない"]},
        {section:"アウトロ",lines:["四月が来ると","一緒にいた場所が見える","言えなかった言葉たちが","花びらのように散っていって","去ったものたちが教えてくれたんだ","今この瞬間ここにいることが","どれほど輝かしいことかを","四月は毎回、そうやって来る"]}
      ]
    }
  },
  {
    num:7, origLang:"ko", titleKr:"5월의 첫 향기", titleEn:"The First Scent of May (Jazz)",
    duration:"3:20", tags:["jazz"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/7.The.First.Scent.of.May_Jazz.mp3",
    lyrics:{
      ko:[
        {section:"1절",lines:["봄비가 내리네","여긴 생각보다 차가워","근데 우산 없이도","왠지 즐거워보여"]},
        {section:"2절",lines:["젖은 거리 위로","웃음이 흐르고","그 속에 섞인 나는","이 거리가 포근해"]},
        {section:"후렴",lines:["여기여서 인지","봄이어서 인지","아니면, 그냥","오늘이어서인지","좋은 사람 곁에선","봄이 좀더 봄같아","오늘이 어제보다","무척 따뜻했어"]},
        {section:"3절",lines:["빗소리 사이로","니 목소리가 들려","아무 말 아닌데","자꾸 귀 기울이게 돼","젖어도 괜찮아","이 순간이 좋으니까","잠깐 멈춰도 돼","딱 이만큼만"]},
        {section:"브리지",lines:["외롭지만 함께하는 밤,","쏟아지는 계절 위에","널 위한 작은 우산이","펼쳐지려 해","말하지 않아도","같은 걸 보고 있어","보이지 않아도","같은 소리가 나와"]},
        {section:"아웃트로",lines:["이 비가 그치면","또 다른 하늘이 오겠지","근데 오늘 이 비가","오히려 좋아","기다려온 시간,","도쿄 밤공기처럼","우리의 봄은","더 짙어질거야"]}
      ],
      es:[
        {section:"Verso 1",lines:["La lluvia de primavera cae","Aquí hace más frío de lo que pensaba","Pero incluso sin paraguas","Por alguna razón, parece alegría"]},
        {section:"Verso 2",lines:["Sobre las calles mojadas","La risa fluye","Y yo mezclado allí","Esta calle se siente cálida"]},
        {section:"Estribillo",lines:["¿Es por este lugar?","¿Porque es primavera?","¿O quizás","Solo porque es hoy?","Al lado de una buena persona","La primavera parece más primavera","Hoy fue tan mucho más cálido","Que ayer"]},
        {section:"Verso 3",lines:["Entre el sonido de la lluvia","Puedo escuchar tu voz","No estás diciendo nada","Y sin embargo sigo inclinando el oído","Mojarse está bien","Porque este momento es tan bueno","Puedes parar por un momento","Solo esto"]},
        {section:"Puente",lines:["Una noche solitaria pero juntos","Sobre una estación que se derrama","Un pequeño paraguas para ti","Está a punto de abrirse","Sin decir nada","Estamos mirando lo mismo","Aunque no se vea","El mismo sonido sale"]},
        {section:"Outro",lines:["Cuando esta lluvia pare","Vendrá otro cielo","Pero la lluvia de hoy","Me gusta incluso más","El tiempo que hemos esperado","Como el aire nocturno de Tokio","Nuestra primavera","Solo se volverá más profunda"]}
      ],
      en:[
        {section:"Verse 1",lines:["Spring rain is falling","It's colder here than I thought","But even without an umbrella","Somehow it looks like joy"]},
        {section:"Verse 2",lines:["Over the wet streets","Laughter flows","And me mixed in there","This street feels so warm"]},
        {section:"Chorus",lines:["Is it because of this place?","Because it's spring?","Or maybe","Just because it's today?","By the side of a good person","Spring feels more like spring","Today felt so much warmer","Than yesterday"]},
        {section:"Verse 3",lines:["Through the sound of rain","I can hear your voice","You're not even saying anything","And yet I keep leaning in to listen","Getting wet is okay","Because this moment is so good","You can stop for a moment","Just this much"]},
        {section:"Bridge",lines:["A night lonely yet together","Over a pouring season","A small umbrella meant for you","Is about to open","Without saying anything","We're looking at the same thing","Even without seeing it","The same sound comes out"]},
        {section:"Outro",lines:["When this rain stops","Another sky will come","But today's rain","I actually love","The time we've been waiting for","Like the Tokyo night air","Our spring","Will only grow deeper"]}
      ],
      ja:[
        {section:"1番",lines:["春雨が降っている","ここは思ったより冷たい","でも傘がなくても","なぜか嬉しそうに見える"]},
        {section:"2番",lines:["濡れた街並みの上を","笑い声が流れて","その中に混じる私は","この街が温かく感じる"]},
        {section:"サビ",lines:["ここだからかな","春だからかな","それともただ","今日だからかな","良い人のそばでは","春がもっと春らしく感じる","今日が昨日より","ずっと温かかった"]},
        {section:"3番",lines:["雨音の間から","君の声が聞こえる","何でもない言葉なのに","つい耳を傾けてしまう","濡れてもいい","この瞬間が好きだから","少し止まってもいい","ちょうどこれくらい"]},
        {section:"ブリッジ",lines:["寂しいけれど共にいる夜","降り注ぐ季節の上に","君のための小さな傘が","開こうとしている","言葉にしなくても","同じものを見ている","見えなくても","同じ音が響いている"]},
        {section:"アウトロ",lines:["この雨が止んだら","また別の空が来るだろう","でも今日のこの雨が","むしろ好きだ","待ち続けた時間が","東京の夜の空気のように","私たちの春は","もっと深まっていく"]}
      ]
    }
  },

  {
    num:9, origLang:"ja", titleKr:"春の路地先", titleEn:"봄의 길목 어귀에서",
    duration:"3:13", tags:["j-indie","neo-classical"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/9.Tokyo.mp3",
    lyrics:{
      ja:[
        {section:"1番",lines:["五月の陽差しが伸びて","東京の路地の果てまで届く","あの光の下で","まだ夢を握り直してるね"]},
        {section:"2番",lines:["崩れそうな日も","ちゃんと出勤してたじゃないか","それがどれほど凄いことか","きみたちは気づいてないみたい"]},
        {section:"サビ",lines:["子どもの頃に描いた絵","まだ捨ててなかったんだね","twenty めざして seven 年 走ってきた","くしゃくしゃでも本物だから"]},
        {section:"3番",lines:["人の波に揉まれて","削れて、また削れながら","気づかぬうちに広がるのが","生きるってことなんだろうな"]},
        {section:"ブリッジ",lines:["泣きたい夕暮れに","無理やり笑ったこともあるよね","それでもその場所に居続けたこと","それだけで十分すぎるくらい","疲れても踏ん張る夜は","ちゃんと積み重なってる","誰も見てくれなくても","きみの中で育ってるから"]},
        {section:"4番",lines:["全部叶わなくても","夢見たことは残るよ","その痕跡がきっと","きみをつくり続けていく","笑い合った日より","共に耐えた日の方が多くても","だからこそ私たちは","本物なんだと思う"]},
        {section:"アウトロ",lines:["この街がきみたちを","全部わかってくれなくても","私はわかってるよ","きみたちの春がどこにあるか","待たなくていいよ","春はもう来てるから","今いるこの場所","それが全てだよ"]}
      ],
      ko:[
        {section:"1절",lines:["오월의 햇살이 뻗어","도쿄의 골목 끝까지 닿는다","그 빛 아래서","너는 아직도 꿈을 다시 쥐고 있구나"]},
        {section:"2절",lines:["무너질 것 같던 날에도","제대로 출근했잖아","그게 얼마나 대단한 일인지","너희는 모르는 것 같아"]},
        {section:"후렴",lines:["어릴 때 그렸던 그림","아직 버리지 않았구나","스물을 향해 일곱 해를 달려왔어","구겨졌어도 진짜니까"]},
        {section:"3절",lines:["사람들 물결에 휩쓸려","깎이고, 또 깎이면서","어느새 넓어지는 게","살아간다는 거겠지"]},
        {section:"브리지",lines:["울고 싶던 저녁에","억지로 웃은 적도 있잖아","그래도 그 자리에 계속 있었다는 것만으로","충분하고도 남아","지쳐도 버텨내는 밤은","착실히 쌓여가고 있어","아무도 봐주지 않아도","너 안에서 자라고 있으니까"]},
        {section:"4절",lines:["전부 이루어지지 않아도","꿈꿨던 것들은 남아","그 흔적이 분명","너를 계속 만들어나갈 거야","함께 웃던 날보다","같이 버텨낸 날이 더 많아도","그렇기에 우리는","진짜라고 생각해"]},
        {section:"아웃트로",lines:["이 도시가 너희를 다 이해해주지 않아도","나는 알고 있어, 너희의 봄이 어디에 있는지","기다리지 않아도 돼","봄은 이미 와 있으니까","지금 있는 이 자리","그게 전부야"]}
      ],
      es:[
        {section:"Verso 1",lines:["La luz de mayo se extiende","Llegando hasta el final de los callejones de Tokio","Bajo esa luz","Todavía estás aferrando de nuevo tu sueño"]},
        {section:"Verso 2",lines:["Incluso en los días en que ibas a derrumbarte","Igual fuiste, ¿verdad?","Lo increíble que fue eso","Probablemente ni siquiera te das cuenta"]},
        {section:"Estribillo",lines:["El dibujo que hiciste de niño","Todavía no lo has tirado","Corriendo siete años hacia los veinte","Aunque arrugado, es lo real"]},
        {section:"Verso 3",lines:["Zarandeado por las olas de gente","Desgastado, y desgastado de nuevo","La forma en que te expandes sin darte cuenta","Eso debe ser lo que es vivir"]},
        {section:"Puente",lines:["En las tardes en que querías llorar","Hubo veces que forzaste una sonrisa","Pero solo el hecho de que te quedaste — en ese lugar","Es más que suficiente","Las noches en que aguantaste el agotamiento","Se van acumulando correctamente","Aunque nadie esté mirando","Porque está creciendo dentro de ti"]},
        {section:"Verso 4",lines:["Aunque no todo se cumpla","Lo que soñaste permanece","Esa huella con seguridad","Seguirá haciéndote quien eres","Más días de aguantar juntos","Que días de reír juntos","Por eso precisamente somos","Lo real, creo"]},
        {section:"Outro",lines:["Aunque esta ciudad no te entienda completamente","Yo sé dónde está tu primavera","No necesitas esperar","La primavera ya ha llegado","El lugar donde estás ahora mismo","Eso lo es todo"]}
      ],
      en:[
        {section:"Verse 1",lines:["The May sunlight stretches","Reaching to the end of Tokyo's alleyways","Under that light","You're still holding your dream again"]},
        {section:"Verse 2",lines:["Even on the days you were about to fall apart","You still showed up, didn't you?","How incredible that was","You probably don't even realize"]},
        {section:"Chorus",lines:["The drawing you made as a child","You still haven't thrown it away","Running seven years toward twenty","Even crumpled, it's the real thing"]},
        {section:"Verse 3",lines:["Tossed by the waves of people","Worn down, and worn down again","The way you expand without noticing","That must be what living is"]},
        {section:"Bridge",lines:["On evenings when you wanted to cry","There were times you forced a smile","But just the fact that you stayed — in that place","That's more than enough","The nights you pushed through exhaustion","Are stacking up properly","Even if no one is watching","Because it's growing inside you"]},
        {section:"Verse 4",lines:["Even if not everything comes true","What you dreamed of remains","That trace will surely","Keep making you who you are","More days of enduring together","Than days of laughing together","That's exactly why we","Are the real thing, I think"]},
        {section:"Outro",lines:["Even if this city doesn't understand you completely","I know where your spring is","You don't need to wait","Spring has already come","The place where you are right now","That's everything"]}
      ]
    }
  },
  {
    num:10, origLang:"es", titleKr:"Viento de Magallanes", titleEn:"마가야네스의 바람",
    duration:"3:04", tags:["world"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/10.Viento.de.Magallanes.mp3",
    lyrics:{
      ko:[
        {section:"1절",lines:["마가야네스의 바람이여","내 이름을 부르는구나","지도의 끝자락에서","우리는 여기 있다"]},
        {section:"2절",lines:["뒤돌아보지 않는 오후","시선을 돌리지 않고","바람 사이 갈매기들","우리처럼 자유롭게"]},
        {section:"후렴",lines:["남쪽 별자리로 계절을 읽고","해협의 바람결로 내일을 셀 수 있어","세상의 소음은 닿지 않아","우리의 침묵이 목소리","저 밖에 넘쳐흐르는 것들","여기선 필요 없어"]},
        {section:"3절",lines:["바람은 차갑고 하늘은 회색이어도","우리의 온기는 더 깊어져","일 년 내내 추위가 계속돼도","우리 가슴은 더 따뜻해"]},
        {section:"브리지",lines:["내 눈빛은 꺼지지 않아","겨울도 막을 수 없어","여기, 심장이 불타오르고","추위 속에 더 강해져","세상이 보지 못하는 재능들","이 하늘 아래 잠들어 있어","진실의 냄새를 품은 영혼","진짜 사람들의 냄새"]},
        {section:"4절",lines:["우리의 웃음 속에 세계가 담기고","우리 동네에 우주가 있어","가장 큰 꿈은 여기서 태어나","끝자락에서, 여기서","잊혀진 게 아니야","멀리 있기에 자유로운 것","바람이 강할수록","뿌리는 더 깊이 내린다"]},
        {section:"아웃트로",lines:["이제 날아오를 시간이 왔어","마침내 날개를 펼칠 때","여기에서, 온 세계로","끝자락에서, 중심으로","끝자락의 꽃은 모든 꽃보다 오래 피어","아무도 피어나는 걸 보지 못해도","아무도 잊지 않아","우리의 오늘, 우리의 영원"]}
      ],
      es:[
        {section:"Verso 1",lines:["Viento de Magallanes,","llamas mi nombre.","Último punto del mapa —","aquí estamos nosotros."]},
        {section:"Verso 2",lines:["Tarde sin mirar atrás,","sin volver la vista.","Gaviotas entre el viento,","libres como nosotros."]},
        {section:"Estribillo",lines:["Por estrellas del sur leemos las estaciones.","Por la brisa del estrecho contamos el mañana.","El ruido del mundo no llega —","nuestro silencio es voz.","Lo que sobra allá afuera,","aquí no nos hace falta."]},
        {section:"Verso 3",lines:["Frío el viento, gris el cielo,","más hondo aún nuestro calor.","Un año entero de frío —","más cálido es nuestro pecho."]},
        {section:"Puente",lines:["Mi mirada nunca se apaga,","ni el invierno la detiene.","Arde el corazón aquí,","más fuerte con el frío.","Talentos que el mundo no ve,","dormidos bajo este cielo.","Alma que huele a verdad,","a gente de verdad."]},
        {section:"Verso 4",lines:["En nuestra risa cabe el mundo,","en nuestro barrio, el universo.","El sueño más grande nace aquí,","en el último confín.","No olvidados —","libres por estar lejos.","Las raíces van más hondo","cuando el viento es más fuerte."]},
        {section:"Outro",lines:["Llegó el momento de volar,","de abrir las alas al fin.","Desde aquí, al mundo entero —","desde el confín, al centro.","La flor del confín dura más que todas.","Nadie la ve crecer —","pero nadie la olvida.","Nuestro hoy, nuestro siempre."]}
      ],
      en:[
        {section:"Verse 1",lines:["Wind of Magallanes,","you call my name.","At the final point of the map —","here we are."]},
        {section:"Verse 2",lines:["An afternoon without looking back,","without turning our gaze.","Seagulls among the wind,","free, like us."]},
        {section:"Chorus",lines:["By the southern stars we read the seasons.","By the breeze of the strait we count tomorrow.","The noise of the world doesn't reach here —","our silence is a voice.","What overflows out there,","we don't need it here."]},
        {section:"Verse 3",lines:["Cold the wind, gray the sky,","yet our warmth goes deeper.","A whole year of cold —","and our hearts grow warmer."]},
        {section:"Bridge",lines:["My gaze never goes out,","not even winter can stop it.","Here the heart burns,","growing stronger in the cold.","Talents the world doesn't see,","sleeping under this sky.","A soul that smells of truth,","the scent of real people."]},
        {section:"Verse 4",lines:["In our laughter the world fits,","in our neighborhood, the universe.","The greatest dream is born here,","at the far edge, right here.","Not forgotten —","free because we are far.","The roots go deeper","when the wind is stronger."]},
        {section:"Outro",lines:["The time to fly has come,","to finally open our wings.","From here, to the whole world —","from the edge, to the center.","The flower of the far edge lasts longest of all.","Nobody sees it bloom —","but nobody forgets it.","Our today, our always."]}
      ],
      ja:[
        {section:"1番",lines:["マゼランの風よ","私の名を呼んでいるね","地図の果てで","私たちはここにいる"]},
        {section:"2番",lines:["振り返らない午後","視線を逸らさずに","風の間のカモメたちは","私たちのように自由に"]},
        {section:"サビ",lines:["南の星座で季節を読み","海峡の風で明日を数える","世界の騒音は届かない","私たちの沈黙が声になる","あの外に溢れているものは","ここでは必要ない"]},
        {section:"3番",lines:["風は冷たく空は灰色でも","私たちの温もりはもっと深くなる","一年中寒さが続いても","私たちの胸はもっと温かい"]},
        {section:"ブリッジ",lines:["私の眼差しは消えない","冬でも止められない","ここでは、心臓が燃え上がり","寒さの中でもっと強くなる","世界が見ない才能たちが","この空の下で眠っている","真実の匂いを宿した魂","本物の人たちの匂い"]},
        {section:"4番",lines:["私たちの笑い声の中に世界が宿り","私たちの街に宇宙がある","最も大きな夢はここで生まれる","果てで、ここで","忘れられたわけじゃない","遠くにあるから自由なんだ","風が強いほど","根はより深く伸びていく"]},
        {section:"アウトロ",lines:["今、飛び立つ時が来た","ついに翼を広げる時","ここから、世界中へ","果てから、中心へ","果ての花はどんな花よりも長く咲く","誰も咲くのを見なくても","誰も忘れない","私たちの今日、私たちの永遠"]}
      ]
    }
  }

  {
    num:11, origLang:"es", titleKr:"Cielo de Ely", titleEn:"엘리의 하늘",
    duration:"3:34", tags:["world","ballad"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/11.Cielo.de.Ely.mp3",
    lyrics:{
      ko:[
        {section:"1절",lines:["세상의 한가운데서","하늘이 둘로 나뉘는 그곳","산들이 품어 안은","비와 햇살"]},
        {section:"2절",lines:["키토는 울다가 웃는다","같은 하루 안에서","그랬어요, 그대의 사랑도","그랬어요, 그대의 삶도"]},
        {section:"3절",lines:["기억해요, 그 손을","꽃잎을 어루만지던","살아있다는 온기","빛깔들, 그 향기"]},
        {section:"4절",lines:["언제나 놀라워했죠","피어나는 꽃잎 하나에도","삶은 얼마나 따뜻한가요","색으로 가득 찬 곁에서"]},
        {section:"브리지",lines:["산이 그대를 품어주고","바람이 그대를 실어가네요","비와 기억 사이로","그 사랑은 멀어지지 않아요"]},
        {section:"후렴",lines:["이제 구름 위에서","피친차 위에 계시네요","하늘의 꽃들이","그대와 함께하겠지요","빗속의 햇살이 내 뺨에 닿을 때","그게 할머니인 줄 알아요"]},
        {section:"5절",lines:["너무 그리워요","그리고 그대 이름으로 가겠어요","그대가 보지 못한","꽃들의 세계로"]},
        {section:"6절",lines:["그대의 빛깔들을 담아가겠어요","모든 곳에","세상의 한가운데서","그대의 사랑으로 피어나겠어요"]},
        {section:"브리지2",lines:["끊임없는 빗소리가","그 목소리를 간직하고","꽃과 빛깔 사이로","두 분을 향해 이끌어요"]},
        {section:"아웃트로",lines:["빛의 모든 줄기 안에서","꽃잎 하나하나에서","세상의 중심에서","사랑이 피어나요"]}
      ],
      es:[
        {section:"Verso 1",lines:["En la mitad del mundo","donde el cielo es dos","las montañas abrazan","la lluvia y el sol"]},
        {section:"Verso 2",lines:["Quito llora y ríe","en el mismo día","así era tu amor","así era tu vida"]},
        {section:"Verso 3",lines:["Recuerdo esas manos","tocando la flor","el calor de estar viva","los colores, su olor"]},
        {section:"Verso 4",lines:["Sorprenderse siempre","de cada pétalo en flor","qué cálido es vivir","rodeada de color"]},
        {section:"Puente",lines:["La montaña te guarda","el viento te lleva","entre lluvia y recuerdo","ese amor no se aleja"]},
        {section:"Estribillo",lines:["Ahora en las nubes","sobre el Pichincha estás","las flores del cielo","contigo estarán","cuando el sol de aguas toca mi mejilla","sé que eres tú abuelita"]},
        {section:"Verso 5",lines:["Te extraño tanto","y en tu nombre partiré","a un mundo de flores","que no pudiste ver"]},
        {section:"Verso 6",lines:["Llevaré tus colores","a cada rincón","desde la mitad del mundo","crezco con tu amor"]},
        {section:"Puente 2",lines:["La lluvia constante","guarda esa voz","entre flores y colores","me guía hacia los dos"]},
        {section:"Outro",lines:["En cada rayo de luz","en cada pétalo y flor","desde el centro del mundo","florece el amor"]}
      ],
      en:[
        {section:"Verse 1",lines:["At the middle of the world","where the sky is two","the mountains embrace","the rain and the sun"]},
        {section:"Verse 2",lines:["Quito cries and laughs","within the same day","such was your love","such was your life"]},
        {section:"Verse 3",lines:["I remember those hands","touching the flower","the warmth of being alive","the colors, their scent"]},
        {section:"Verse 4",lines:["Always marveling","at each petal in bloom","how warm it is to live","surrounded by color"]},
        {section:"Bridge",lines:["The mountain holds you","the wind carries you","between rain and memory","that love stays near"]},
        {section:"Chorus",lines:["Now in the clouds","above Pichincha you are","the flowers of heaven","will be with you","when the rain-sun touches my cheek","I know it's you, grandmother"]},
        {section:"Verse 5",lines:["I miss you so much","and in your name I will journey","to a world of flowers","you never got to see"]},
        {section:"Verse 6",lines:["I will carry your colors","to every corner","from the middle of the world","I grow with your love"]},
        {section:"Bridge 2",lines:["The constant rain","holds that voice","between flowers and colors","it guides me toward you both"]},
        {section:"Outro",lines:["In every ray of light","in every petal and flower","from the center of the world","love blooms"]}
      ],
      ja:[
        {section:"1番",lines:["世界の真ん中で","空が二つに分かれるその場所","山々が抱きとめた","雨と陽射し"]},
        {section:"2番",lines:["キトは泣いては笑う","同じ一日の中で","そうでした、あなたの愛も","そうでした、あなたの人生も"]},
        {section:"3番",lines:["覚えています、あの手を","花びらを撫でていた","生きているという温もり","色たち、その香り"]},
        {section:"4番",lines:["いつも驚いていましたね","咲くひとつの花びらにさえも","人生はどれほど温かいでしょう","色で満たされたそばで"]},
        {section:"ブリッジ",lines:["山があなたを抱きしめ","風があなたを運んでいく","雨と記憶の間を","あの愛は遠ざかりません"]},
        {section:"サビ",lines:["今、雲の上で","ピチンチャの上にいらっしゃるのですね","空の花々が","あなたと共にいることでしょう","雨の中の陽射しが私の頬に触れる時","それがおばあちゃんだと分かるのです"]},
        {section:"5番",lines:["とても恋しいです","そしてあなたの名で旅立ちます","あなたが見られなかった","花たちの世界へ"]},
        {section:"6番",lines:["あなたの色たちを携えていきます","すべての場所に","世界の真ん中で","あなたの愛で咲き誇ります"]},
        {section:"ブリッジ2",lines:["絶え間ない雨音が","あの声を抱きしめて","花と色たちの間を","お二人へと導いてくれます"]},
        {section:"アウトロ",lines:["光のすべての筋の中で","花びら一枚一枚から","世界の中心で","愛が咲いていきます"]}
      ]
    }
  }
  ,{
    num:12, origLang:"ko", titleKr:"서두르지 않아", titleEn:"OVERHEAT",
    duration:"3:44", tags:["k-indie","ballad","neo-classical"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/12.OVERHEAT.mp3",
    lyrics:{
      ko:[{section:"1절",lines:["오월은 벌써 Overheat, 좀 이른 무더위","초록은 왜 그리 서둘러 피어나는지","그늘 없는 길 위의 발걸음들","다들 쫓기듯 숨이 차 보여","멀리 번지는 아지랑이처럼","마음들이 조급하게 일렁이는 오후"]},{section:"2절",lines:["더 높은 가지를 원해, 쉬지 못하는 새","스치기만 해도 날을 세우는 장미처럼","다들 예쁜 가시를 품고 있어","이 화려한 계절 뒤에 숨어서","작은 바람 한 점에도 뒤처질까","여린 잎사귀마저 잔뜩 긴장한 채로"]},{section:"후렴",lines:["서두르지 않아도 봄은 가고 여름은 오니","너의 가련한 시간을, 잠시 내려놓아도 돼","길을 잃은 작은 새도, 날을 세운 장미도","이 밤엔 그저 편안히 눈을 감기를"]},{section:"3절",lines:["이미 품에 안은 꽃잎을 놓지 않으려","덩굴들은 서로의 목을 세차게 감아쥐고","내일의 가뭄이 찾아올까 두려워","마른 흙 속의 수액을 남김없이 들이켜네","아름다운 정원이라 믿었던 이곳마저","누군가의 자리를 빼앗아야 서는 곳일까"]},{section:"4절",lines:["스쳐 지나가는 나비의 작은 날갯짓에도","독을 품은 풀잎들은 온몸을 뒤흔들며","얕보이지 않으려 더 큰 소리로 서걱대네","사소한 흔들림조차 용서하지 못하는 밤","저마다의 마음에 두터운 벽을 세우고","날카로운 눈빛으로 서로를 겨누고 있어"]},{section:"5절",lines:["난 가만히 멈춰 서서 바라봐","속도를 높이는 초록의 달리기","참 안쓰러워, 왜 그리 서둘러 가야 해?","시들어갈 목마름이 눈에 밟혀","화사한 외면 뒤에 숨겨진","서글픈 그 영혼들을 가만히 쓸어내려"]},{section:"아웃트로",lines:["세상이 아무리 빠르게 흘러가도","I’m on my way, 내 안의 고요를 만나","치우치지 않는 나만의 눈빛으로","이 오월을 다정하게 안아줄래","휩쓸리지 않는 단단한 마디 하나","그렇게 천천히, 나답게"]}],
      en:[{section:"Verse 1",lines:["May is already overheating — a heat too early","Why is the green in such a hurry to bloom?","Footsteps on a road without any shade","Everyone looks breathless, as if pursued","Like a heat haze spreading far in the distance","Hearts ripple restlessly through the afternoon"]},{section:"Verse 2",lines:["Wanting a higher branch — the bird that cannot rest","Like a rose that bristles at the lightest touch","Everyone is holding pretty thorns inside","Hiding behind this gorgeous season","Afraid of falling behind at the slightest breeze","Even the tender leaves are tightly braced"]},{section:"Chorus",lines:["Even without hurrying, spring leaves and summer comes","Your pitiful time — you can set it down for a while","The little lost bird, the rose with its thorns raised —","May they just close their eyes peacefully tonight"]},{section:"Verse 3",lines:["Not wanting to release the petals already in their arms","The vines wind fiercely around each other's necks","Afraid that tomorrow's drought will come","They drain every last drop of sap from the dry earth","Even this place I had believed was a beautiful garden —","Is it a place where one must take another's spot to stand?"]},{section:"Verse 4",lines:["Even at the small wing-flutter of a passing butterfly","The poisonous grass blades shudder with their whole bodies","Rustling louder so as not to be looked down upon","A night that cannot forgive even the slightest sway","Each heart builds up thick, thick walls","And takes aim at the others with a sharpened gaze"]},{section:"Verse 5",lines:["I stand still, quietly, and watch","The race of the green, picking up its speed","How sorrowful — why must they hurry so?","The thirst that will one day wither weighs on my eyes","Hidden behind that bright, dazzling surface","I quietly smooth down those sorrowful souls"]},{section:"Outro",lines:["No matter how fast the world flows on","I'm on my way — meeting the stillness inside me","With my own gaze, leaning to no side","I'll hold this May of mine tenderly","One firm joint that won't be swept away","Slowly like that — true to myself"]}],
      es:[{section:"Verso 1",lines:["Mayo ya se recalienta — un calor demasiado temprano","¿Por qué tiene tanta prisa el verde en florecer?","Pasos sobre la calle sin ninguna sombra","Todos parecen sin aliento, como si los persiguieran","Como una bruma de calor que se extiende a lo lejos","Los corazones se agitan inquietos por la tarde"]},{section:"Verso 2",lines:["Queriendo una rama más alta — el ave que no descansa","Como una rosa que eriza las espinas al más leve roce","Todos llevan hermosas espinas dentro","Escondiéndose tras esta estación deslumbrante","Por miedo a quedarse atrás con la brisa más leve","Hasta las hojas tiernas están tensas y alertas"]},{section:"Estribillo",lines:["Aun sin apurarte, la primavera se va y llega el verano","Tu lastimoso tiempo — puedes dejarlo por un momento","El pequeño pájaro perdido, la rosa con sus espinas en alto —","Que esta noche, simplemente, cierren los ojos en paz"]},{section:"Verso 3",lines:["Para no soltar los pétalos que ya tienen entre los brazos","Las enredaderas se aferran con fuerza al cuello de las otras","Por miedo a que llegue la sequía del mañana","Beben hasta la última savia de la tierra reseca","Hasta este lugar que creía un hermoso jardín —","¿Es donde uno debe quitar el sitio de otro para estar de pie?"]},{section:"Verso 4",lines:["Aun ante el leve aleteo de una mariposa que pasa","Las hierbas envenenadas se sacuden con todo el cuerpo","Crujen más fuerte para que no las miren por debajo","Una noche que no perdona ni el más leve temblor","Cada corazón levanta paredes gruesas","Apuntando miradas afiladas unas contra otras"]},{section:"Verso 5",lines:["Yo me detengo en silencio y miro","La carrera del verde acelerándose","Qué triste — ¿por qué tienen que apurarse así?","La sed que va a marchitar me pesa en los ojos","Escondidas tras ese exterior tan brillante","Acaricio en silencio aquellas almas tristes"]},{section:"Outro",lines:["Por más rápido que pase el mundo","Voy en camino — al encuentro del silencio dentro de mí","Con mi propia mirada que no se inclina","Abrazaré con dulzura este mayo mío","Una sola juntura firme que no se deja arrastrar","Así, despacio — fiel a mí misma"]}],
      ja:[{section:"1番",lines:["五月はもう Overheat、少し早すぎる暑さ","緑はどうしてあんなに急いで咲くのか","日陰のない道の上の足音たち","みんな追われるように息を切らせている","遠くに揺らぐ陽炎のように","心たちが慌ただしく揺らぐ午後"]},{section:"2番",lines:["もっと高い枝を望む、休めない鳥","触れるだけで刺を立てる薔薇のように","みんな美しい棘を抱いている","この華やかな季節の裏に隠れて","わずかな風にも遅れを取らないかと","幼い葉さえも張り詰めたまま"]},{section:"サビ",lines:["急がなくても春は去り夏は来る","君のいじらしい時間を、少し下ろしてもいい","道に迷った小さな鳥も、棘を立てた薔薇も","今夜はただ穏やかに目を閉じられるように"]},{section:"3番",lines:["すでに腕に抱いた花びらを離すまいと","蔓たちは互いの首を激しく絡め取り","明日の干ばつが来るのを恐れて","乾いた土の中の樹液を残らず飲み干していく","美しい庭だと信じたこの場所さえも","誰かの場所を奪わねば立てない所なのか"]},{section:"4番",lines:["通り過ぎる蝶の小さな羽ばたきにも","毒を抱いた草の葉たちは全身を揺らし","見くびられまいと、もっと大きな音で擦れ合う","些細な揺らぎさえも許せない夜","それぞれの心に分厚い壁を築き","鋭い眼差しで互いを狙い合っている"]},{section:"5番",lines:["私はそっと立ち止まって見つめる","速度を上げていく緑の駆け抜け","本当に切ない、なぜそんなに急がねばならないの?","やがて萎れる渇きが目に焼きつく","華やかな表面の裏に隠された","悲しみを湛えたその魂たちを、静かに撫でていく"]},{section:"アウトロ",lines:["世界がどんなに速く流れても","I'm on my way、私の中の静けさに会いに行く","偏らない、私だけの眼差しで","この五月を優しく抱きしめてあげよう","流されない、しっかりとした節目をひとつ","そうやってゆっくり、私らしく"]}]
    }
  }

    num:13, origLang:"es", titleKr:"La Vida De La Pampa", titleEn:"팜파스의 삶",
    duration:"3:22", tags:["world","neo-classical"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/13.La.Vida.De.La.Pampa.mp3",
    lyrics:{
      es:[{section:"Verso 1",lines:["El viento cruza la pampa sin parar","en Buenos Aires el tango siempre arde","el Río de la Plata corre hacia el mar","corazón del sur que nunca duerme"]},{section:"Verso 2",lines:["Humo de asado, vino, noche que cae","una empanada con el sabor de esta tierra","desde el otro lado del mundo lo sé","ese aroma llega y me despierta"]},{section:"Verso 3",lines:["Lejos del ruido, un pueblo quieto y fiel","una estación que guarda lo que fuimos","el viento en el andén, el tiempo que se fue","y el dulce perfume de los pastelitos"]},{section:"Verso 4",lines:["El lugar que dejó mamá vacío","lo llenaste en silencio, como la naturaleza","en 20 de Junio floreciste igual que ese pueblo","ese pueblo tiene tu misma terneza"]},{section:"Puente",lines:["Che, boludo, fuiste, Diego, la luz que alumbró en la oscuridad","y Meli ya navega su propio mar"]},{section:"Verso 5",lines:["Las manos que dieron sin que nadie viera","hicieron crecer lo que hoy el mundo ve","no hace falta decirlo","y el silencio lo sabe"]},{section:"Verso 6",lines:["Con el viento que sopla desde Corea","llegan aromas de horizontes lejanos","como el mate que se pasa de mano en mano","así estamos unidos, sin fronteras"]},{section:"Verso 7",lines:["Algún día partiremos juntos","a los paisajes bellos de este mundo","con el viento pampeano en la espalda","buscando otro horizonte nuevo"]},{section:"Verso 8",lines:["En el pasado y hoy","eres un padre inmenso","las flores que florecieron aquí","hoy vuelan hacia el mundo entero"]},{section:"Outro",lines:["Esta noche llena tu copa de vino","alza el asado hasta el cielo","y baila el tango de la felicidad","y que la noche no termine"]}],
      ko:[{section:"1절",lines:["바람은 쉼 없이 팜파스를 가로지르고","부에노스아이레스엔 언제나 탱고가 타올라","라플라타강은 바다를 향해 흐르네","결코 잠들지 않는 남쪽의 심장"]},{section:"2절",lines:["아사도의 연기, 와인, 내려앉는 밤","이 땅의 맛을 담은 엠파나다 한 조각","세상 저편에서도 나는 알아","그 향이 다가와 나를 깨우는 걸"]},{section:"3절",lines:["소란에서 멀리, 고요하고 정겨운 마을","우리였던 시절을 간직한 작은 역","플랫폼 위의 바람, 흘러가 버린 시간","그리고 파스텔리토스의 달콤한 향기"]},{section:"4절",lines:["엄마가 떠나며 비워 둔 그 자리를","당신은 자연처럼 말없이 채워 주었죠","20 데 후니오에서, 당신은 저 마을처럼 피어났고","그 마을은 당신과 똑 닮은 따스함을 품었네"]},{section:"브리지",lines:["이봐 친구, 디에고, 당신은 어둠을 밝힌 빛이었어","그리고 멜리는 이제 자신만의 바다를 항해하네"]},{section:"5절",lines:["아무도 보지 않을 때 베풀어 온 그 손길이","오늘 세상이 보는 것들을 키워 냈죠","굳이 말하지 않아도","침묵이 그걸 알고 있어"]},{section:"6절",lines:["한국에서 불어오는 바람을 타고","머나먼 지평선의 향기가 닿아오네","손에서 손으로 건네는 마테차처럼","그렇게 우린 국경 없이 이어져 있어"]},{section:"7절",lines:["언젠가 우리 함께 떠나요","이 세상의 아름다운 풍경들을 향해","팜파스의 바람을 등에 지고서","또 다른 새로운 지평을 찾아"]},{section:"8절",lines:["지난날에도, 오늘도","당신은 한없이 큰 아버지예요","여기 피어났던 꽃들이","오늘 온 세상을 향해 날아가네"]},{section:"아웃트로",lines:["오늘 밤 당신의 잔을 와인으로 채워요","아사도를 하늘 높이 들어 올리고","행복의 탱고를 추어요","이 밤이 끝나지 않기를"]}],
      en:[{section:"Verse 1",lines:["The wind sweeps across the pampa without rest","in Buenos Aires the tango is always ablaze","the Río de la Plata runs toward the sea","heart of the south that never sleeps"]},{section:"Verse 2",lines:["Smoke of asado, wine, the falling night","an empanada with the flavor of this land","from the other side of the world I know it","that aroma reaches me and wakes me"]},{section:"Verse 3",lines:["Far from the noise, a town quiet and faithful","a station that keeps what we once were","the wind on the platform, the time that has gone","and the sweet perfume of the pastelitos"]},{section:"Verse 4",lines:["The place that mother left empty","you filled it in silence, like nature itself","in 20 de Junio you bloomed just like that town","that town holds the very same tenderness as you"]},{section:"Bridge",lines:["Hey, my friend, Diego, you were the light that shone in the dark","and Meli now sails her own sea"]},{section:"Verse 5",lines:["The hands that gave without anyone seeing","raised up what the world sees today","there is no need to say it","and the silence already knows"]},{section:"Verse 6",lines:["With the wind that blows from Korea","aromas of distant horizons arrive","like the mate passed from hand to hand","that is how we are joined, without borders"]},{section:"Verse 7",lines:["Someday we will set off together","toward the beautiful landscapes of this world","with the pampa wind at our backs","searching for another new horizon"]},{section:"Verse 8",lines:["In the past and today","you are an immense father","the flowers that bloomed here","today fly out to the whole world"]},{section:"Outro",lines:["Tonight fill your cup with wine","raise the asado up to the sky","and dance the tango of happiness","and may the night never end"]}],
      ja:[{section:"1番",lines:["風は止むことなくパンパを駆け抜け","ブエノスアイレスではタンゴがいつも燃えている","ラ・プラタ川は海へと流れてゆく","決して眠らない南の心臓"]},{section:"2番",lines:["アサードの煙、ワイン、暮れゆく夜","この大地の味を抱いたエンパナーダひとつ","世界の反対側にいても私は知っている","あの香りが届いて私を目覚めさせる"]},{section:"3番",lines:["喧騒から遠く、静かで懐かしい町","かつての私たちを守る小さな駅","プラットホームの風、過ぎ去った時間","そしてパステリートスの甘い香り"]},{section:"4番",lines:["母が去って空けたあの場所を","あなたは自然のように静かに満たしてくれた","20デ・フニオで、あなたはあの町のように花開き","その町はあなたと同じ温もりを抱いている"]},{section:"ブリッジ",lines:["なあ友よ、ディエゴ、あなたは闇を照らした光だった","そしてメリは今、自分だけの海を航海している"]},{section:"5番",lines:["誰も見ていないところで与え続けたその手が","今、世界が目にするものを育て上げた","あえて言わなくても","沈黙がそれを知っている"]},{section:"6番",lines:["韓国から吹いてくる風に乗って","遠い地平線の香りが届く","手から手へと渡されるマテ茶のように","そうして私たちは国境なく繋がっている"]},{section:"7番",lines:["いつか一緒に旅立とう","この世界の美しい風景へと","パンパの風を背に受けて","また新しい地平を求めて"]},{section:"8番",lines:["過ぎた日も、今日も","あなたは限りなく大きな父","ここで咲いた花たちが","今、世界中へと飛んでゆく"]},{section:"アウトロ",lines:["今夜あなたの杯をワインで満たそう","アサードを空高く掲げ","幸せのタンゴを踊ろう","この夜が終わらないように"]}]
    }
  }

    num:14, origLang:"en", titleKr:"June in New York", titleEn:"뉴욕의 6월",
    duration:"3:12", tags:["world","ballad"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/14.JuneInNewYork.mp3",
    lyrics:{
      en:[{section:"Verse 1",lines:["The Bow Bridge caught the afternoon","its white rail warm beneath my hand","a thousand strangers crossed the park","and you were one I didn't plan"]},{section:"Verse 2",lines:["a teacup that read Jenny, warm as June on grass","the flowers leaned along the shore","between the bridges, Brooklyn wind","was pulling both of us toward more"]},{section:"Bridge",lines:["I showed too much","too fast, too bright","the kind of heat","you can't take back at night"]},{section:"Refrain",lines:["The clouds still race above the park","the crowd moves on without a sound","I fold myself back into days","like nothing lost was ever found"]},{section:"Chorus",lines:["But June in New York","still lives somewhere behind my eyes","that Bow Bridge, and those tearing clouds","and you between the crowds and sky"]},{section:"Verse 3",lines:["I sat alone in DUMBO's sun","the bench still held a trace of warm","the bridge above, the river wide","and me with nowhere left to go"]},{section:"Verse 4",lines:["On Fifth I passed our window glass","and saw my face still flushed and strange","Times Square was loud, the lights were full","but I just needed to exchange"]},{section:"Bridge 2",lines:["I should have known","this heat won't keep","the kind of love","you lose before you sleep"]},{section:"Verse 5",lines:["New York forgets by morning light","eight million faces, none held tight","but somewhere in that river bend","June keeps a thing that wouldn't end"]},{section:"Outro",lines:["But June in New York","will not come twice, I know that now","that Bow Bridge, and those tearing clouds —","the truest thing I'd not allow"]}],
      ko:[{section:"1절",lines:["보 브리지에 오후가 내려앉고","하얀 난간은 내 손 아래 따스했지","수천의 낯선 이들이 공원을 가로질렀고","너는 내가 계획하지 않은 단 하나였어"]},{section:"2절",lines:["제니라 적힌 찻잔, 풀밭 위 6월처럼 따뜻했고","꽃들은 강가를 따라 기울었지","다리들 사이로 브루클린의 바람이","우리 둘을 더 먼 곳으로 끌어당겼어"]},{section:"브리지",lines:["난 너무 많이 보여줬어","너무 빠르게, 너무 환하게","밤이 오면 되돌릴 수 없는","그런 열기였지"]},{section:"후렴",lines:["구름은 여전히 공원 위를 내달리고","사람들은 소리 없이 스쳐 지나가","나는 다시 일상 속으로 나를 접어 넣어","잃은 것 따윈 없었다는 듯이"]},{section:"코러스",lines:["하지만 뉴욕의 6월은","아직 내 눈 뒤 어딘가에 살아 있어","그 보 브리지, 그리고 찢어지던 구름들","그리고 군중과 하늘 사이의 너"]},{section:"3절",lines:["난 덤보의 햇살 속에 홀로 앉았어","벤치엔 아직 온기의 흔적이 남아 있었지","위로는 다리, 넓게 흐르는 강","그리고 더는 갈 곳 없는 나"]},{section:"4절",lines:["5번가에서 우리의 그 유리창을 지났고","여전히 붉게 상기된 낯선 내 얼굴을 봤어","타임스 스퀘어는 시끄럽고 불빛은 가득했지만","난 그저 무언가를 바꾸고 싶었을 뿐"]},{section:"브리지2",lines:["난 알았어야 했어","이 열기는 오래가지 않는다는 걸","잠들기도 전에 잃어버리는","그런 사랑이라는 걸"]},{section:"5절",lines:["뉴욕은 아침빛에 잊어버려","팔백만의 얼굴, 그 누구도 붙잡히지 않아","하지만 저 강굽이 어딘가에","6월은 끝나지 않을 무언가를 간직하고 있어"]},{section:"아웃트로",lines:["하지만 뉴욕의 6월은","두 번 다시 오지 않아, 이제 난 알아","그 보 브리지, 그리고 찢어지던 구름들 —","내가 끝내 허락하지 못한 가장 진실한 것"]}],
      es:[{section:"Verso 1",lines:["El Bow Bridge atrapó la tarde","su baranda blanca tibia bajo mi mano","mil desconocidos cruzaron el parque","y tú eras uno que no planeé"]},{section:"Verso 2",lines:["una taza que decía Jenny, tibia como junio en la hierba","las flores se inclinaban junto a la orilla","entre los puentes, el viento de Brooklyn","nos arrastraba a ambos hacia algo más"]},{section:"Puente",lines:["Mostré demasiado","muy rápido, muy brillante","esa clase de fuego","que de noche no se puede deshacer"]},{section:"Estribillo",lines:["Las nubes aún corren sobre el parque","la multitud sigue sin un sonido","me pliego de vuelta en los días","como si nada perdido hubiera existido"]},{section:"Coro",lines:["Pero junio en Nueva York","aún vive en algún lugar tras mis ojos","ese Bow Bridge, y aquellas nubes desgarradas","y tú entre la multitud y el cielo"]},{section:"Verso 3",lines:["Me senté sola al sol de DUMBO","el banco aún guardaba un rastro de calor","el puente arriba, el río ancho","y yo sin ningún lugar adonde ir"]},{section:"Verso 4",lines:["En la Quinta pasé por nuestro cristal","y vi mi rostro aún sonrojado y extraño","Times Square rugía, las luces plenas","pero yo solo necesitaba cambiar"]},{section:"Puente 2",lines:["Debí haberlo sabido","este fuego no perdura","esa clase de amor","que pierdes antes de dormir"]},{section:"Verso 5",lines:["Nueva York olvida con la luz del alba","ocho millones de rostros, ninguno retenido","pero en algún recodo de aquel río","junio guarda algo que no terminaría"]},{section:"Outro",lines:["Pero junio en Nueva York","no vendrá dos veces, ahora lo sé","ese Bow Bridge, y aquellas nubes desgarradas —","lo más verdadero que no me permití"]}],
      ja:[{section:"1番",lines:["ボウ・ブリッジが午後を捉えた","白い手すりは私の手の下で温かく","幾千もの見知らぬ人が公園を横切り","あなたは私が思いもしなかった一人だった"]},{section:"2番",lines:["ジェニーと記された茶碗、草の上の六月のように温かく","花々は岸辺に沿って傾いていた","橋と橋の間を、ブルックリンの風が","私たち二人をもっと遠くへ引き寄せていた"]},{section:"ブリッジ",lines:["私は見せすぎた","あまりに速く、あまりに眩しく","夜には取り消せない","そんな熱だった"]},{section:"サビ",lines:["雲は今も公園の上を駆けてゆき","人波は音もなく過ぎていく","私はまた日々の中へ自分を畳み込む","失くしたものなど何もなかったように"]},{section:"コーラス",lines:["でもニューヨークの六月は","まだ私の瞳の奥のどこかに生きている","あのボウ・ブリッジ、そして引き裂かれる雲たち","そして群衆と空の間のあなた"]},{section:"3番",lines:["私はダンボの陽射しの中に一人座った","ベンチにはまだ温もりの跡が残っていた","頭上には橋、広く流れる川","そして行き場を失くした私"]},{section:"4番",lines:["五番街で私たちのあの窓ガラスを通り過ぎ","今も赤く火照った見知らぬ私の顔を見た","タイムズスクエアは騒がしく、光は溢れていたけれど","私はただ何かを取り替えたかっただけ"]},{section:"ブリッジ2",lines:["分かっているべきだった","この熱は続かないと","眠る前に失ってしまう","そんな愛だと"]},{section:"5番",lines:["ニューヨークは朝の光で忘れてしまう","八百万の顔、どれ一つ抱きとめられず","でもあの川の曲がり角のどこかに","六月は終わらない何かを抱いている"]},{section:"アウトロ",lines:["でもニューヨークの六月は","二度とは来ない、今はもう分かる","あのボウ・ブリッジ、そして引き裂かれる雲たち —","私がついに許せなかった、最も真実なもの"]}]
    }
  }

    num:15, origLang:"en", titleKr:"Canvas of Ana in Romania", titleEn:"루마니아, 아나의 캔버스",
    duration:"3:35", tags:["world","neo-classical"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/15.CanvasOfAnaInRomania.mp3",
    lyrics:{
      en:[{section:"Verse 1",lines:["Frozen gears of memories, staying here in Romania","Leaving all the city noise, we face the quiet town of rest","The old Clock Museum only drips the time we used to know","Heavy weight of silent loss fades into the canvas blow"]},{section:"Verse 2",lines:["Her fingertips evoke the deepest shades of silent blue","Unspoken words at midnight pressing down her spirit too","Changing seasons step across the graying shade to Ploiești","Independence Boulevard halts the rushing rush that we made"]},{section:"Verse 3",lines:["Breathing through the chestnut leaves, the scent of lime begins to bloom","Classic proportions, modern lines, reviving from the gloom","In this cultural heartland where Ana's vision softly lands","A sharp, historic eye evokes what timeless grace demands"]},{section:"Verse 4",lines:["Capturing the entire world within a single stroke and trace","The cosmos held inside her frame, a masterpiece of space","Paint-stained apron on her waist, a lonely medal she defined","Erasing all Bucharest's ghosts, the colder lines she left behind"]},{section:"Verse 5",lines:["Concerts on the Chestnut Street, the chords are drifting like the rain","Breaking down the canvas walls, dissolving all the hidden pain","Summer scent is in the air, renaissance of the old decree","Inside Ana's frames of light, we are finally set free"]}],
      ko:[{section:"1절",lines:["기억의 얼어붙은 톱니바퀴, 이곳 루마니아에 머무르며","도시의 소음을 모두 떠나, 우리는 고요한 안식의 마을을 마주해","오래된 시계 박물관은 우리가 알던 시간만을 똑똑 떨구고","침묵한 상실의 무거운 무게가 캔버스의 붓질 속으로 스며드네"]},{section:"2절",lines:["그녀의 손끝은 가장 깊은 침묵의 푸른 빛깔을 불러내고","한밤의 말 못 한 언어들이 그녀의 영혼마저 짓누르네","변해가는 계절은 잿빛 그늘을 지나 플로이에슈티로 발 딛고","독립 대로는 우리가 내달리던 분주함을 멈춰 세우네"]},{section:"3절",lines:["밤나무 잎새 사이로 숨 쉬며, 라임 향기가 피어나기 시작하고","고전적인 비례, 현대적인 선들이 우울 속에서 되살아나네","아나의 시선이 부드럽게 내려앉는 이 문화의 심장부에서","예리하고 역사 깊은 눈이 영원한 우아함이 요구하는 것을 불러내"]},{section:"4절",lines:["단 한 번의 붓질과 흔적 안에 온 세상을 담아내고","그녀의 화폭 안에 깃든 우주, 공간의 걸작이여","허리에 두른 물감 묻은 앞치마, 그녀가 정의한 외로운 훈장","부쿠레슈티의 모든 유령을 지우고, 더 차가운 선들을 뒤로 남겼네"]},{section:"5절",lines:["밤나무 거리의 연주회, 화음은 빗줄기처럼 흩날리고","캔버스의 벽을 허물며, 숨겨진 모든 아픔을 녹여내네","여름 향기가 공기 중에 감돌고, 오래된 칙령의 르네상스여","아나의 빛의 화폭 안에서, 우리는 마침내 자유로워지네"]}],
      es:[{section:"Verso 1",lines:["Engranajes congelados de recuerdos, aquí en Rumania nos quedamos","dejando todo el ruido de la ciudad, frente al pueblo quieto del descanso","el viejo Museo del Reloj solo gotea el tiempo que conocíamos","el peso pesado de la pérdida callada se funde en el trazo del lienzo"]},{section:"Verso 2",lines:["Sus dedos evocan los tonos más hondos de un azul callado","palabras no dichas a medianoche oprimen también su espíritu","las estaciones cambiantes cruzan la sombra gris hacia Ploiești","el Bulevar de la Independencia detiene la prisa que llevábamos"]},{section:"Verso 3",lines:["Respirando entre las hojas de castaño, el aroma del tilo empieza a florecer","proporciones clásicas, líneas modernas, reviviendo desde la penumbra","en este corazón cultural donde la visión de Ana suavemente aterriza","un ojo agudo e histórico evoca lo que la gracia eterna exige"]},{section:"Verso 4",lines:["Capturando el mundo entero en un solo trazo y huella","el cosmos contenido en su marco, una obra maestra del espacio","delantal manchado de pintura en su cintura, una medalla solitaria que definió","borrando todos los fantasmas de Bucarest, las líneas más frías que dejó atrás"]},{section:"Verso 5",lines:["Conciertos en la Calle del Castaño, los acordes flotan como la lluvia","derribando las paredes del lienzo, disolviendo todo el dolor oculto","el aroma del verano está en el aire, renacimiento del viejo decreto","dentro de los marcos de luz de Ana, por fin somos libres"]}],
      ja:[{section:"1番",lines:["記憶の凍りついた歯車、ここルーマニアに留まって","街の喧騒をすべて離れ、静かな安らぎの町と向き合う","古い時計博物館は、私たちが知っていた時間だけを滴らせ","沈黙した喪失の重い重さが、カンバスの一筆へと溶けてゆく"]},{section:"2番",lines:["彼女の指先は、最も深い静かな青の陰影を呼び起こし","真夜中の語られぬ言葉が、彼女の魂をも押さえつける","移りゆく季節は、灰色の影を越えてプロイエシュティへと歩み","独立大通りは、私たちが駆けた慌ただしさを止める"]},{section:"3番",lines:["栗の葉の間を呼吸し、菩提樹の香りが咲き始める","古典的な比率、現代的な線が、憂いの中から蘇る","アナの眼差しがそっと降り立つ、この文化の心臓部で","鋭く歴史ある目が、永遠の優雅さが求めるものを呼び起こす"]},{section:"4番",lines:["ただ一筆と痕跡の中に、世界のすべてを捉え","彼女の額縁に宿る宇宙、空間の傑作よ","腰には絵の具に染まったエプロン、彼女が定めた孤独な勲章","ブカレストのすべての亡霊を消し、より冷たい線を後に残した"]},{section:"5番",lines:["栗の街路のコンサート、和音は雨のように漂い","カンバスの壁を打ち壊し、隠されたすべての痛みを溶かす","夏の香りが空気に漂い、古き勅令のルネサンス","アナの光の額縁の中で、私たちはついに解き放たれる"]}]
    }
  }

    num:16, origLang:"es", titleKr:"Alma de San Cristóbal", titleEn:"산 크리스토발의 영혼",
    duration:"3:56", tags:["world","ballad"], src:"https://github.com/yhcho3964-prog/lumi-music/releases/download/v1.0/16.AlmaDeSanCristobal.mp3",
    lyrics:{
      es:[{section:"Verso 1",lines:["Entre el río Torbes y los Andes del alma","el Puente Real refleja el amanecer","la Plaza Bolívar huele a café caliente","San Cristóbal abre la puerta antes de ver"]},{section:"Verso 2",lines:["La pisca andina calienta el corazón","las hallacas perfuman cada callejón","el forastero llega y ya es de la familia","el pabellón servido, nadie está solo, no"]},{section:"Verso 3",lines:["En Peribeca el sol tiñe la tarde","el hervido en la olla, manos que no se olvidan","el pan de jamón en los labios nos sabe","a algo que llegó desde muy lejos y que guía"]},{section:"Verso 4",lines:["La cuajada y el café con leche","y el aroma del pernil nos envuelve","cada sabor es una historia que vuelve","con el alma que en cada bocado se mueve"]},{section:"Verso 5",lines:["El cielo de esta ciudad, su viento","y entre sus verdes prados yo la siento","el aliento de mamá aún está aquí","como si nunca se hubiera ido de mí"]},{section:"Verso 6",lines:["Y en algún lugar del mundo, ahora mismo","está esperando a María con el mantel puesto","el aroma del arepa, café con leche","llamando a sus amigos, lista para el festejo"]},{section:"Verso 7",lines:["Con su sonrisa eterna preparando","lo que más amaba dar — su mesa abierta","porque ella nunca supo despedirse","su amor se queda, aunque la puerta esté entreabierta"]},{section:"Verso 8",lines:["La Sierra de La Culata abraza el cielo","la eterna primavera en esta tierra","Venezuela, tu mañana será glorioso","este amor, este sabor, en el alma se aferra"]},{section:"Outro",lines:["Esta canción es para San Cristóbal","para su gente bella y su calor","la Feria de San Sebastián nos llama","y bailamos todos con el mismo amor"]}],
      ko:[{section:"1절",lines:["토르베스 강과 영혼의 안데스 사이에서","푸엔테 레알은 동트는 새벽을 비추고","볼리바르 광장엔 뜨거운 커피 향이 감돌아","산 크리스토발은 보기도 전에 문을 열어주네"]},{section:"2절",lines:["안데스의 피스카는 마음을 데우고","아야카는 골목골목마다 향기를 퍼뜨려","낯선 이가 와도 이미 한 가족이 되고","차려진 파베욘 앞에, 그 누구도 외롭지 않아"]},{section:"3절",lines:["페리베카에선 햇살이 오후를 물들이고","냄비 속 에르비도, 잊지 못할 손길들","입술에 닿는 하몬 빵은 우리에게","아주 먼 곳에서 와 우리를 이끄는 무언가의 맛"]},{section:"4절",lines:["쿠아하다와 카페 콘 레체","그리고 페르닐의 향이 우리를 감싸네","모든 맛은 다시 돌아오는 하나의 이야기","한 입마다 살아 움직이는 영혼과 함께"]},{section:"5절",lines:["이 도시의 하늘, 그 바람","그리고 푸른 초원 사이에서 나는 그녀를 느껴","엄마의 숨결이 아직 여기 남아 있어","마치 내게서 한 번도 떠난 적 없는 것처럼"]},{section:"6절",lines:["그리고 세상 어딘가에서, 바로 지금","식탁보를 펼쳐 두고 마리아를 기다리고 있어","아레파의 향기, 카페 콘 레체","친구들을 부르며, 축제를 맞이할 준비가 되었네"]},{section:"7절",lines:["영원한 미소로 준비하고 있어","그녀가 가장 베풀기 좋아하던 것 — 활짝 열린 식탁","그녀는 결코 작별할 줄 몰랐기에","문이 반쯤 열려 있어도, 그녀의 사랑은 머무르네"]},{section:"8절",lines:["시에라 데 라 쿨라타가 하늘을 끌어안고","이 땅엔 영원한 봄이 깃들어","베네수엘라여, 너의 내일은 영광스러우리라","이 사랑, 이 맛은, 영혼 속에 단단히 새겨지네"]},{section:"아웃트로",lines:["이 노래는 산 크리스토발을 위한 것","그 아름다운 사람들과 그들의 따스함을 위한 것","산 세바스티안 축제가 우리를 부르고","우리 모두 같은 사랑으로 춤을 추네"]}],
      en:[{section:"Verse 1",lines:["Between the Torbes River and the Andes of the soul","the Puente Real reflects the breaking dawn","the Plaza Bolívar smells of hot coffee","San Cristóbal opens its door before you even see"]},{section:"Verse 2",lines:["The Andean pisca warms the heart","the hallacas perfume every alleyway","the stranger arrives and is already family","the pabellón served, no one is alone, no"]},{section:"Verse 3",lines:["In Peribeca the sun tints the afternoon","the hervido in the pot, hands that are never forgotten","the pan de jamón on our lips tastes to us","of something that came from far away and guides us"]},{section:"Verse 4",lines:["The cuajada and the café con leche","and the aroma of the pernil wraps around us","every flavor is a story that returns","with the soul that stirs in every bite"]},{section:"Verse 5",lines:["The sky of this city, its wind","and among its green meadows I feel her","mother's breath is still here","as if she had never left me"]},{section:"Verse 6",lines:["And somewhere in the world, right now","she is waiting for María with the tablecloth laid","the aroma of the arepa, café con leche","calling her friends, ready for the feast"]},{section:"Verse 7",lines:["With her eternal smile preparing","what she loved most to give — her open table","because she never knew how to say goodbye","her love remains, though the door is left ajar"]},{section:"Verse 8",lines:["The Sierra de La Culata embraces the sky","the eternal spring upon this land","Venezuela, your tomorrow will be glorious","this love, this flavor, clings to the soul"]},{section:"Outro",lines:["This song is for San Cristóbal","for its beautiful people and its warmth","the Feria de San Sebastián calls to us","and we all dance with the same love"]}],

const TAG_LABEL={"k-indie":"K-인디","ballad":"발라드","jazz":"재즈","neo-classical":"네오클래시컬","j-indie":"J-인디","world":"월드뮤직","electronic":"일렉트로닉"};
let currentIdx=-1,isPlaying=false,lyricsOpen=false,currentLang='ko';
let repeatMode=false, playAllMode=false;
const video=document.getElementById('hidden-video');

function renderTracks(filter){
  const c=document.getElementById('track-container');c.innerHTML='';
  TRACKS.forEach((t,i)=>{
    if(filter!=='all'&&!t.tags.includes(filter))return;
    const row=document.createElement('div');
    row.className='track-row'+(i===currentIdx?' playing':'');
    row.dataset.idx=i;row.onclick=()=>playTrack(i);
    row.innerHTML=`<div class="track-num"><span class="num-label">${t.num}</span><span class="playing-anim"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span></div><div class="track-info"><div class="track-title-kr">${t.titleKr}</div><div class="track-title-en">${t.titleEn}</div></div><div class="track-tags">${t.tags.map(g=>`<span class="tag">${TAG_LABEL[g]||g}</span>`).join('')}</div><div class="track-duration">${t.duration}</div>`;
    c.appendChild(row);
  });
}

// ── Media Session API (잠금화면 컨트롤 + 백그라운드 재생 유지) ──
function updateMediaSession(t){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title: t.titleKr,
    artist: 'LU:MI',
    album: '2025 Spring Collection',
    artwork:[{src:'https://lumi-music.netlify.app/favicon.ico',sizes:'96x96',type:'image/x-icon'}]
  });
  navigator.mediaSession.setActionHandler('play',()=>{ensureAudioContext();video.play();isPlaying=true;updateUI();requestWakeLock();});
  navigator.mediaSession.setActionHandler('pause',()=>{video.pause();isPlaying=false;updateUI();releaseWakeLock();});
  navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  navigator.mediaSession.setActionHandler('seekto',(d)=>{if(video.duration)video.currentTime=d.seekTime;});
}

// AudioContext — iOS 백그라운드 재생 유지용
let audioCtx=null;
function ensureAudioContext(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}

function playTrack(idx){
  currentIdx=idx;const t=TRACKS[idx];
  currentLang=t.origLang||'ko';
  ensureAudioContext();
  video.src=t.src;
  video.volume=parseFloat(document.getElementById('vol-slider').value);
  const p=video.play();
  if(p!==undefined){
    p.then(()=>{isPlaying=true;updateUI();updateMediaSession(t);renderLangTabs();if(lyricsOpen)renderLyrics();requestWakeLock();})
     .catch(e=>{console.warn('play() blocked:',e);isPlaying=false;updateUI();});
  }else{
    isPlaying=true;updateUI();updateMediaSession(t);renderLangTabs();if(lyricsOpen)renderLyrics();
  }
}
function togglePlay(){
  if(currentIdx<0){playTrack(0);return;}
  if(isPlaying){video.pause();isPlaying=false;updateUI();releaseWakeLock();}
  else{
    ensureAudioContext();
    const p=video.play();
    if(p!==undefined){p.then(()=>{isPlaying=true;updateUI();}).catch(e=>console.warn(e));}
    else{isPlaying=true;updateUI();}
  }
}
function prevTrack(){playTrack(currentIdx>0?currentIdx-1:TRACKS.length-1);}
function nextTrack(){playTrack((currentIdx+1)%TRACKS.length);}

// ended: 반복/전체재생 모드 반영
video.addEventListener('ended',()=>{
  const isLast = currentIdx === TRACKS.length - 1;
  if(!isPlaying) releaseWakeLock();
  if(repeatMode){
    // 반복: 마지막곡 끝나면 1번으로
    playTrack(isLast ? 0 : currentIdx + 1);
  } else if(playAllMode){
    // 전체재생: 마지막곡 끝나면 정지
    if(isLast){ isPlaying=false; updateUI(); }
    else { playTrack(currentIdx + 1); }
  } else {
    // 기본: 다음곡 자동재생
    playTrack((currentIdx+1)%TRACKS.length);
  }
});

// 전체재생 버튼
function playAll(){
  playAllMode=true; repeatMode=false;
  document.getElementById('play-all-btn').classList.add('active');
  document.getElementById('repeat-btn').classList.remove('active');
  playTrack(0);
}

// 반복재생 토글
function toggleRepeat(){
  repeatMode=!repeatMode;
  if(repeatMode){ playAllMode=false; document.getElementById('play-all-btn').classList.remove('active'); }
  document.getElementById('repeat-btn').classList.toggle('active', repeatMode);
  document.getElementById('repeat-btn').textContent = repeatMode ? '↺ 반복 ON' : '↺ 반복';
}

video.addEventListener('timeupdate',()=>{
  if(!video.duration)return;
  document.getElementById('progress-fill').style.width=(video.currentTime/video.duration*100)+'%';
  document.getElementById('time-cur').textContent=fmt(video.currentTime);
  document.getElementById('time-total').textContent=fmt(video.duration);
});
function seekTo(e){const r=e.currentTarget.getBoundingClientRect();if(video.duration)video.currentTime=((e.clientX-r.left)/r.width)*video.duration;}
function setVolume(v){video.volume=parseFloat(v);}
function fmt(s){return Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');}

function updateUI(){
  document.querySelectorAll('.track-row').forEach(r=>r.classList.toggle('playing',parseInt(r.dataset.idx)===currentIdx));
  const t=TRACKS[currentIdx];
  document.getElementById('player-title').textContent=t?t.titleKr:'—';
  document.getElementById('player-title-en').textContent=t?t.titleEn:'';
  document.getElementById('play-btn').innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';
  if('mediaSession' in navigator)navigator.mediaSession.playbackState=isPlaying?'playing':'paused';
}
function filterTracks(tag,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderTracks(tag);
}
function toggleLyrics(){lyricsOpen?closeLyrics():openLyrics();}
function openLyrics(){
  lyricsOpen=true;
  document.getElementById('lyrics-panel').classList.add('open');
  document.getElementById('main').classList.add('lo');
  document.getElementById('player-bar').classList.add('lo');
  const btn=document.getElementById('lyrics-toggle-btn');btn.classList.add('active');btn.textContent='가사 닫기';
  renderLyrics();
}
function closeLyrics(){
  lyricsOpen=false;
  document.getElementById('lyrics-panel').classList.remove('open');
  document.getElementById('main').classList.remove('lo');
  document.getElementById('player-bar').classList.remove('lo');
  const btn=document.getElementById('lyrics-toggle-btn');btn.classList.remove('active');btn.textContent='가사 보기';
}
const LANG_LABEL={ko:'한국어',en:'English',es:'Español',ja:'日本語'};
const LANG_ORDER=['ko','en','es','ja'];

function renderLangTabs(){
  const container=document.getElementById('lang-tabs');
  if(!container)return;
  if(currentIdx<0){container.innerHTML='';return;}
  const t=TRACKS[currentIdx];
  const orig=t.origLang||'ko';
  const available=Object.keys(t.lyrics);
  // origLang 먼저, 이후 고정순서
  const ordered=[orig,...LANG_ORDER.filter(l=>l!==orig&&available.includes(l))];
  container.innerHTML=ordered.map(l=>
    `<button class="lang-tab${l===currentLang?' active':''}" onclick="switchLang('${l}',this)">${LANG_LABEL[l]||l}</button>`
  ).join('');
}

function switchLang(lang,btn){
  currentLang=lang;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLyrics();
}
function renderLyrics(){
  const body=document.getElementById('lyrics-body');
  if(currentIdx<0){body.innerHTML='<div class="no-lyrics">곡을 선택하면<br>가사가 표시됩니다</div>';return;}
  const t=TRACKS[currentIdx];
  document.getElementById('lp-title').textContent=t.titleKr;
  document.getElementById('lp-sub').textContent=t.titleEn;
  renderLangTabs();
  const verses=t.lyrics[currentLang]||[];
  const cls=currentLang==='en'?' en':currentLang==='es'?' es':'';
  body.innerHTML=verses.map(v=>`<div class="lyric-verse"><span class="lyric-section-tag">${v.section}</span>${v.lines.map(l=>`<div class="lyric-line${cls}">${l}</div>`).join('')}</div>`).join('');
}
renderTracks('all');

// ===== Wake Lock API — 백그라운드 오디오 유지 핵심 =====
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{ wakeLock=null; });
    }
  }catch(e){ console.warn('WakeLock failed:',e); }
}
async function releaseWakeLock(){
  if(wakeLock){ await wakeLock.release(); wakeLock=null; }
}

// 백그라운드→포그라운드 복귀 시 재생 복구 + WakeLock 재요청
document.addEventListener('visibilitychange', async ()=>{
  if(!document.hidden){
    if(isPlaying && video.paused){
      ensureAudioContext();
      video.play().catch(e=>console.warn('resume failed:',e));
    }
    if(isPlaying) await requestWakeLock();
  }
});

// iOS 포커스 복귀 시 AudioContext 재개
window.addEventListener('focus',()=>{
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  if(isPlaying&&video.paused) video.play().catch(()=>{});
});
